name: CI

# Runs the same gates we run locally. Nothing here invents a new process;
# every command below is one a developer runs on their own machine.
# See docs/decisions/0011-ci-scope.md for the scope rationale.

on:
  push:
    branches: [main]
  pull_request:

# Cancel previous runs on the same branch if a new push comes in
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # JS / TS Job
  # ---------------------------------------------------------------------------
  js-ts:
    name: JS/TS (Node 20)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Prettier format check
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: Build plugin (production pipeline)
        run: pnpm build-plugin

      - name: Guard - no source maps in plugin dist
        run: |
          if find plugins/quote-wizard/assets/dist -name '*.map' -print -quit | grep -q .; then
            echo "::error::Source map found in plugins/quote-wizard/assets/dist - must not ship."
            find plugins/quote-wizard/assets/dist -name '*.map'
            exit 1
          fi
          echo "OK: no source maps in plugin dist."

      - name: Guard - manifest present in plugin dist
        run: |
          if [ ! -f plugins/quote-wizard/assets/dist/manifest.json ]; then
            echo "::error::manifest.json missing from plugin dist after build."
            exit 1
          fi
          echo "OK: manifest.json present."

  # ---------------------------------------------------------------------------
  # PHP Job
  # ---------------------------------------------------------------------------
  php:
    name: PHP (8.2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        working-directory: plugins/quote-wizard
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHPCS (lint - warnings fail)
        working-directory: plugins/quote-wizard
        run: composer lint

      - name: PHPStan (static analysis)
        working-directory: plugins/quote-wizard
        run: composer analyse

      - name: Pest (unit tests)
        working-directory: plugins/quote-wizard
        run: vendor/bin/pest --no-configuration
